# Resolver is needed so nginx can look up the "api" service name in Docker DNS
# (otherwise the upstream is resolved at startup and stale if the api restarts).
resolver 127.0.0.11 valid=10s ipv6=off;

# Rate limit: 10 req/min per client IP for public ticket submission
limit_req_zone $http_cf_connecting_ip zone=tickets_zone:10m rate=10r/m;

server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    client_max_body_size 64k;

    # Cloudflare real IP (tunnel already sets CF-Connecting-IP at the edge)
    real_ip_header CF-Connecting-IP;

    # ---- proxy defaults (applied to /api and /admin locations below) ----
    set $api_upstream "api:8182";

    # ---- gzip ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ---- security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ---- hashed immutable assets ----
    location ~* ^/_astro/.*\.(js|css|woff2?|ttf|svg|png|jpg|jpeg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # ---- static assets (non-hashed) ----
    location ~* \.(ico|png|jpg|jpeg|webp|avif|svg|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # ---- SPA-style fallback (Astro is static but future-proofs it) ----
    location / {
        try_files $uri $uri/ $uri.html /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # ---- deny hidden files and common junk ----
    location ~ /\.(?!well-known) { deny all; access_log off; log_not_found off; }
    location = /favicon.ico     { access_log off; log_not_found off; }
    location = /robots.txt      { access_log off; log_not_found off; }

    # ---- health endpoint ----
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ---- public API (rate-limited) ----
    location = /api/tickets {
        limit_req zone=tickets_zone burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_set_header CF-IPCountry      $http_cf_ipcountry;
        proxy_read_timeout 10s;
        proxy_connect_timeout 3s;
    }

    location /api/ {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_read_timeout 15s;
    }

    # ---- admin (CF Access protects this at the edge; nginx just proxies) ----
    location /admin {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass Cloudflare Access identity headers straight through.
        proxy_set_header Cf-Access-Authenticated-User-Email $http_cf_access_authenticated_user_email;
        proxy_set_header Cf-Access-Jwt-Assertion            $http_cf_access_jwt_assertion;
        proxy_set_header CF-Connecting-IP                   $http_cf_connecting_ip;

        proxy_read_timeout 30s;
    }

    error_page 404 /index.html;
}
